<!doctype html>
<html>
<head lang="en">
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>
<body>
    <sdpi-item label="URL">
        <sdpi-textfield setting="url" placeholder="http://192.168.1.100"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Password">
        <sdpi-password setting="password"></sdpi-password>
    </sdpi-item>

    <sdpi-item label="Command (Press)">
        <sdpi-textfield setting="command1" placeholder="Scheme 4"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Command (Long Press)">
        <sdpi-textfield setting="command2" placeholder="Speed 4 Fade 1"></sdpi-textfield>
    </sdpi-item>
</body>
</html>
