<!doctype html>
<html>
<head lang="en">
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>
<body>
    <sdpi-item label="URL">
        <sdpi-textfield setting="url" placeholder="http://192.168.1.100"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Password">
        <sdpi-password setting="password"></sdpi-password>
    </sdpi-item>

    <sdpi-item label="Color Temperature">
        <sdpi-range setting="ct" min="153" max="500"></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Brightness">
        <sdpi-range setting="brightness" min="0" max="100"></sdpi-range>
    </sdpi-item>
</body>
</html>
